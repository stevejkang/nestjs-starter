name: Integration

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0

      - name: Install packages
        run: |
          npm install

      - name: Run lint
        run: |
          npm run lint:check

      - name: Run typecheck
        run: |
          npm run typecheck

      - name: Run unit tests with coverage
        run: |
          npm run test:cov

      - name: Run build
        run: |
          npm run build

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
